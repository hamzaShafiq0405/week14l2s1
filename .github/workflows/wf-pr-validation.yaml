name: wf-pr-validation 

on:
  pull_request:
    branches:
      - develop



jobs:
  lint-build-job:
    runs-on: ubuntu-latest
    steps:
      - name: repo checkout
        uses: actions/checkout@v4
      - name: lint html and css 
        run: |
          npx htmlhint "**/*.html"
          npx stylelint "**/*.css"
      
      - name: try build
        run: npx parcel build "./src/index.html" --dist-dir "./dev"